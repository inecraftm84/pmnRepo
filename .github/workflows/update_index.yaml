name: Update Index

on:
  push:
    paths:
      - '**.pkg'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate index.txt
        run: |
          ls *.pkg | sed 's/\.pkg$//' > index.txt
          echo "Generated index.txt content:"
          cat index.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update index.txt" && git push)
