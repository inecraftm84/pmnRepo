name: Update Index

on:
  push:
    paths:
      - '**.pkg'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update index.txt
        run: |
          touch index.txt
          find . -maxdepth 1 -name "*.pkg" -printf "%f\n" | sed 's/\.pkg$//' >> index.txt
          sort -u index.txt -o index.txt
          cat index.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.txt
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "auto: update index.txt"
            git push
          else
            echo "No changes to commit"
          fi